<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Carton Inspections</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f4f6f9;
    color: #1a1a2e;
    min-height: 100vh;
  }

  header {
    background: #225091;
    color: white;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  header img.logo { height: 40px; width: auto; }
  header h1 { font-size: 18px; font-weight: 700; }
  .header-title { font-size: 15px; font-weight: 700; color: white; flex: 1; padding-left: 12px; line-height: 1.2; }

  #reload-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }
  #reload-btn:active { background: rgba(255,255,255,0.35); }

  /* Filter bar */
  #filter-bar {
    padding: 12px 16px;
    background: white;
    border-bottom: 1px solid #e4e8f0;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  #filter-bar::-webkit-scrollbar { display: none; }

  .filter-chip {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid #d0d5e0;
    background: white;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: #444;
    transition: all 0.15s;
  }
  .filter-chip.active { color: white; border-color: transparent; }
  .filter-chip[data-status="all"].active { background: #225091; }
  .filter-chip[data-status="Awaiting Date"].active { background: #9b9b9b; }
  .filter-chip[data-status="Scheduled"].active { background: #225091; }
  .filter-chip[data-status="Complete"].active { background: #00c875; }
  .filter-chip[data-status="Missed"].active { background: #df2f4a; }

  /* Main */
  #main { padding: 16px; max-width: 600px; margin: 0 auto; }

  #loading, #empty {
    text-align: center;
    padding: 60px 20px;
    color: #888;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #e0e4ef;
    border-top-color: #225091;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Cards */
  .item-card {
    background: white;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    border: 1.5px solid #eaedf4;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
    gap: 10px;
  }

  .item-name { font-size: 16px; font-weight: 700; color: #1a1a2e; flex: 1; }

  .status-badge {
    flex-shrink: 0;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: white;
  }
  .status-badge.awaiting { background: #9b9b9b; color: #333; }
  .status-badge.scheduled { background: #225091; }
  .status-badge.complete { background: #00c875; color: #004d2e; }
  .status-badge.missed { background: #df2f4a; }

  .field-row { display: flex; flex-direction: column; margin-bottom: 10px; }
  .field-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .field-value { font-size: 14px; color: #2a2a3e; }
  .field-value.empty { color: #bbb; font-style: italic; }

  .edit-toggle {
    width: 100%;
    background: #f0f3fa;
    border: none;
    color: #225091;
    font-weight: 600;
    font-size: 14px;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 4px;
  }
  .edit-toggle:active { background: #dde3f5; }

  .edit-panel { display: none; margin-top: 12px; border-top: 1px solid #eaedf4; padding-top: 12px; }
  .edit-panel.open { display: block; }

  .edit-field { margin-bottom: 12px; }
  .edit-field label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; }

  .edit-field select,
  .edit-field input[type="text"],
  .edit-field input[type="date"],
  .edit-field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d0d5e0;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    background: #fafbff;
    color: #1a1a2e;
    -webkit-appearance: none;
    appearance: none;
  }
  .edit-field select:focus,
  .edit-field input:focus,
  .edit-field textarea:focus { outline: none; border-color: #225091; background: white; }
  .edit-field textarea { min-height: 80px; resize: vertical; }

  .save-btn {
    width: 100%;
    background: #225091;
    color: white;
    border: none;
    padding: 13px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
  }
  .save-btn:active { background: #1a3d70; }
  .save-btn:disabled { background: #aab4cc; cursor: default; }

  .save-status { font-size: 12px; text-align: center; margin-top: 8px; min-height: 18px; color: #00a86b; font-weight: 600; }
  .save-status.error { color: #df2f4a; }

  #add-btn {
    position: fixed;
    bottom: 24px; right: 20px;
    width: 56px; height: 56px;
    border-radius: 28px;
    background: #225091;
    color: white;
    font-size: 28px;
    line-height: 56px;
    text-align: center;
    border: none;
    box-shadow: 0 4px 14px rgba(34,80,145,0.4);
    cursor: pointer;
    z-index: 200;
  }
  #add-btn:active { background: #1a3d70; }

  #add-modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    align-items: flex-end;
  }
  #add-modal-overlay.open { display: flex; }
  #add-modal {
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 36px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
  }
  #add-modal h3 { font-size: 18px; margin-bottom: 16px; }
  #modal-close { float: right; background: none; border: none; font-size: 24px; cursor: pointer; color: #888; line-height: 1; }

  #results-count { font-size: 12px; color: #888; padding: 0 0 8px; font-weight: 500; }
  .photo-upload-label {
    display: flex; align-items: center; gap: 8px;
    background: #f0f3fa; border: 1.5px dashed #b0bcd4;
    border-radius: 10px; padding: 12px; cursor: pointer;
    font-size: 14px; color: #225091; font-weight: 600;
  }
  .photo-upload-label:active { background: #dde3f5; }
  .photo-upload-label input { display: none; }
  .photo-thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .photo-thumbs img { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; border: 1.5px solid #e0e4ef; }
  .existing-photos { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .existing-photos a img { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; border: 1.5px solid #e0e4ef; }

</style>
</head>

  <button class="filter-chip" data-status="Complete">Complete</button>
  <button class="filter-chip" data-status="Missed">Missed</button>

<div id="main">
  <div id="loading"><div class="spinner"></div>Loading inspections…</div>
  <div id="results-count" style="display:none;"></div>
  <div id="items-list"></div>
  <div id="empty" style="display:none;">No inspections found.</div>
</div>

<button id="add-btn">+</button>

<div id="add-modal-overlay">
  <div id="add-modal">
    <button id="modal-close">×</button>
    <h3>New Inspection</h3>
    <div class="edit-field">
      <label>Item Name *</label>
      <input type="text" id="new-name" placeholder="e.g. PO #12345 – Vendor X">
    </div>
    <div class="edit-field">
      <label>Status</label>
      <select id="new-status">
        <option value="5">Awaiting Date</option>
        <option value="0">Scheduled</option>
        <option value="1">Complete</option>
        <option value="2">Missed</option>
      </select>
    </div>
    <div class="edit-field">
      <label>Vendor</label>
      <input type="text" id="new-vendor" placeholder="Vendor name">
    </div>
    <div class="edit-field">
      <label>PO</label>
      <input type="text" id="new-po" placeholder="PO number">
    </div>
    <div class="edit-field">
      <label>Est Arrival</label>
      <input type="date" id="new-arrival">
    </div>
    <div class="edit-field">
      <label>Notes</label>
      <textarea id="new-notes" placeholder="Optional notes…"></textarea>
    </div>
    <button class="save-btn" id="create-btn">Create Inspection</button>
    <div class="save-status" id="create-status"></div>
  </div>
</div>

<script>
const TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjY1NTkyOTY0NCwiYWFpIjoxMSwidWlkIjo2NjIwMDk0MiwiaWFkIjoiMjAyNi0wNS0wOFQxNjo1MzozMS4wMDBaIiwicGVyIjoibWU6d3JpdGUiLCJhY3RpZCI6MTE5OTgxMzgsInJnbiI6InVzZTEifQ.6MTB80plpdgEIa-pABoXVXRzxZCeY__Dbq6eyK2yPKc";
const BOARD_ID = "18418231676";
const STATUS_COL = "color_mm4d856f";
const DAMAGE_COL = "color_mm4dddpn";
const VENDOR_COL = "text_mm4d3ndj";
const PO_COL = "text_mm4d2dm0";
const ARRIVAL_COL = "date_mm4dc3r1";
const COMPLETED_COL = "date_mm4d79d2";
const NOTES_COL = "long_text_mm4dvpwb";
const CONTAINER_COL = "text_mm4fyekj";
const PHOTOS_COL = "file_mm4dwvrg";

const GROUP_MAP = { "5": "topics", "0": "group_title", "1": "group_mm4d36xf", "2": "group_mm4ddnka" };

let allItems = [];
let activeFilter = "all";

async function mondayQuery(query) {
  const res = await fetch("https://api.monday.com/v2", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": TOKEN,
      "API-Version": "2024-01"
    },
    body: JSON.stringify({ query })
  });
  if (!res.ok) throw new Error("Network error " + res.status);
  const json = await res.json();
  if (json.errors) throw new Error(json.errors[0].message);
  return json.data;
}

async function loadItems() {
  setLoading(true);
  document.getElementById("items-list").innerHTML = "";
  document.getElementById("empty").style.display = "none";
  document.getElementById("results-count").style.display = "none";
  try {
    const data = await mondayQuery(`{
      boards(ids: [${BOARD_ID}]) {
        groups {
          id title
          items_page(limit: 100) {
            items {
              id name
              column_values {
                id text value
                column { title type }
              }
            }
          }
        }
      }
    }`);
    allItems = [];
    data.boards[0].groups.forEach(g => {
      g.items_page.items.forEach(item => allItems.push({ ...item, groupTitle: g.title }));
    });
    renderItems();
  } catch (e) {
    document.getElementById("loading").innerHTML = `<p style="color:#df2f4a">Failed to load: ${e.message}</p>`;
    document.getElementById("loading").style.display = "block";
  }
}

function setLoading(on) {
  const el = document.getElementById("loading");
  if (on) { el.innerHTML = '<div class="spinner"></div>Loading inspections…'; }
  el.style.display = on ? "block" : "none";
}

function getCol(item, colId) {
  const cv = item.column_values.find(c => c.id === colId);
  return cv ? (cv.text || "") : "";
}

function getStatusText(item) {
  return getCol(item, STATUS_COL) || item.groupTitle || "";
}

function statusClass(s) {
  if (!s) return "";
  const l = s.toLowerCase();
  if (l.includes("awaiting")) return "awaiting";
  if (l.includes("scheduled")) return "scheduled";
  if (l.includes("complete")) return "complete";
  if (l.includes("missed")) return "missed";
  return "";
}

function renderItems() {
  setLoading(false);
  const list = document.getElementById("items-list");
  const empty = document.getElementById("empty");
  const count = document.getElementById("results-count");
  list.innerHTML = "";

  const filtered = activeFilter === "all"
    ? allItems
    : allItems.filter(item => getStatusText(item).toLowerCase().includes(activeFilter.toLowerCase()));

  count.style.display = filtered.length > 0 ? "block" : "none";
  count.textContent = `${filtered.length} inspection${filtered.length !== 1 ? "s" : ""}`;

  if (filtered.length === 0) { empty.style.display = "block"; return; }
  empty.style.display = "none";

  filtered.forEach(item => {
    const status = getStatusText(item);
    const container = getCol(item, CONTAINER_COL);
    const vendor = getCol(item, VENDOR_COL);
    const po = getCol(item, PO_COL);
    const arrival = getCol(item, ARRIVAL_COL);
    const completedOn = getCol(item, COMPLETED_COL);
    const damage = getCol(item, DAMAGE_COL);
    const notes = getCol(item, NOTES_COL);
    const photos = item.column_values.find(c => c.id === PHOTOS_COL);
    const photoFiles = photos && photos.value ? (()=>{ try{ return JSON.parse(photos.value).files||[]; }catch(e){ return []; } })() : [];

    // Find current status index for select
    const statusIndexMap = {"Awaiting Date":"5","Scheduled":"0","Complete":"1","Missed":"2"};
    const damageIndexMap = {"None":"1","Minor":"0","Major":"2"};
    const sIdx = statusIndexMap[status] || "5";
    const dIdx = damageIndexMap[damage] || "";

    const card = document.createElement("div");
    card.className = "item-card";
    card.innerHTML = `
      <div class="card-header">
        <div class="item-name">${esc(item.name)}</div>
        <span class="status-badge ${statusClass(status)}">${esc(status) || "—"}</span>
      </div>
      ${fRow("Container #", container)}
      ${fRow("Vendor", vendor)}
      ${fRow("PO", po)}
      ${fRow("Est Arrival", arrival)}
      ${fRow("Damage Rating", damage)}
      ${fRow("Completed On", completedOn)}
      ${fRow("Notes", notes)}
      ${photoFiles.length > 0 ? `<div class="field-row"><span class="field-label">Photos</span><div class="existing-photos">${photoFiles.map(f=>`<img src="${f.url||''}" onerror="this.style.display='none'">`).join('')}</div></div>` : ''}
      <button class="edit-toggle" data-id="${item.id}">✏️ Edit</button>
      <div class="edit-panel" id="edit-${item.id}">
        <div class="edit-field"><label>Status</label>
          <select data-col="${STATUS_COL}" data-type="status">
            <option value="5" ${sIdx==="5"?"selected":""}>Awaiting Date</option>
            <option value="0" ${sIdx==="0"?"selected":""}>Scheduled</option>
            <option value="1" ${sIdx==="1"?"selected":""}>Complete</option>
            <option value="2" ${sIdx==="2"?"selected":""}>Missed</option>
          </select>
        </div>
        <div class="edit-field"><label>Vendor</label>
          <input type="text" data-col="${VENDOR_COL}" data-type="text" value="${escA(vendor)}" placeholder="Vendor name">
        </div>
        <div class="edit-field"><label>PO</label>
          <input type="text" data-col="${PO_COL}" data-type="text" value="${escA(po)}" placeholder="PO number">
        </div>
        <div class="edit-field"><label>Container Number</label>
          <input type="text" data-col="${CONTAINER_COL}" data-type="text" value="${escA(container)}" placeholder="Container number">
        </div>
        <div class="edit-field"><label>Est Arrival</label>
          <input type="date" data-col="${ARRIVAL_COL}" data-type="date" value="${escA(arrival)}">
        </div>
        <div class="edit-field"><label>Damage Rating</label>
          <select data-col="${DAMAGE_COL}" data-type="status">
            <option value="">— not set —</option>
            <option value="1" ${dIdx==="1"?"selected":""}>None</option>
            <option value="0" ${dIdx==="0"?"selected":""}>Minor</option>
            <option value="2" ${dIdx==="2"?"selected":""}>Major</option>
          </select>
        </div>
        <div class="edit-field"><label>Completed On</label>
          <input type="date" data-col="${COMPLETED_COL}" data-type="date" value="${escA(completedOn)}">
        </div>
        <div class="edit-field"><label>Notes</label>
          <textarea data-col="${NOTES_COL}" data-type="long_text" placeholder="Notes…">${esc(notes)}</textarea>
        </div>
        <div class="edit-field"><label>Add Photos</label>
          <label class="photo-upload-label">
            📷 Choose photos
            <input type="file" class="photo-input" data-item-id="${item.id}" accept="image/*" multiple>
          </label>
          <div class="photo-thumbs" id="thumbs-${item.id}"></div>
        </div>
        <button class="save-btn" data-item-id="${item.id}">Save Changes</button>
        <div class="save-status" id="status-${item.id}"></div>
      </div>
    `;
    list.appendChild(card);
  });

  list.querySelectorAll(".edit-toggle").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.id;
      const panel = document.getElementById("edit-" + id);
      const isOpen = panel.classList.contains("open");
      list.querySelectorAll(".edit-panel").forEach(p => p.classList.remove("open"));
      list.querySelectorAll(".edit-toggle").forEach(b => b.textContent = "✏️ Edit");
      if (!isOpen) {
        panel.classList.add("open");
        btn.textContent = "✕ Close";
        panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    });
  });


  // Photo preview
  list.querySelectorAll(".photo-input").forEach(input => {
    input.addEventListener("change", () => {
      const thumbs = document.getElementById("thumbs-" + input.dataset.itemId);
      thumbs.innerHTML = "";
      Array.from(input.files).forEach(file => {
        const img = document.createElement("img");
        img.src = URL.createObjectURL(file);
        thumbs.appendChild(img);
      });
    });
  });
  list.querySelectorAll(".save-btn[data-item-id]").forEach(btn => {
    btn.addEventListener("click", () => saveItem(btn));
  });
}

async function saveItem(btn) {
  const itemId = btn.dataset.itemId;
  const panel = btn.closest(".edit-panel");
  const statusEl = document.getElementById("status-" + itemId);
  btn.disabled = true;
  statusEl.textContent = "Saving…";
  statusEl.className = "save-status";
  try {
    const colValues = {};
    panel.querySelectorAll("[data-col]").forEach(el => {
      const col = el.dataset.col;
      const type = el.dataset.type;
      const val = el.value;
      if (type === "status") {
        if (val !== "") colValues[col] = JSON.stringify({ index: parseInt(val) });
        // if empty, skip (leave as-is)
      } else if (type === "date") {
        colValues[col] = val ? JSON.stringify({ date: val }) : "null";
      } else if (type === "long_text") {
        colValues[col] = JSON.stringify({ text: val });
      } else {
        colValues[col] = JSON.stringify(val);
      }
    });
    const colValStr = JSON.stringify(JSON.stringify(colValues));
    await mondayQuery(`mutation {
      change_multiple_column_values(
        item_id: ${itemId},
        board_id: ${BOARD_ID},
        column_values: ${colValStr}
      ) { id }
    }`);
    // Upload any selected photos
    const photoInput = panel.querySelector(".photo-input");
    if (photoInput && photoInput.files.length > 0) {
      statusEl.textContent = "Uploading photos…";
      for (const file of photoInput.files) {
        try {
          const formData = new FormData();
          formData.append("query", `mutation { add_file_to_column(item_id: ${itemId}, column_id: "${PHOTOS_COL}", file: "file") { id } }`);
          formData.append("variables[file]", file, file.name);
          await fetch("https://api.monday.com/v2/file", {
            method: "POST",
            headers: { "Authorization": TOKEN },
            body: formData
          });
        } catch(e) { console.warn("Photo upload error:", e); }
      }
    }
    statusEl.textContent = "✓ Saved!";
    statusEl.className = "save-status";
    setTimeout(() => loadItems(), 1200);
  } catch (e) {
    statusEl.textContent = "Error: " + e.message;
    statusEl.className = "save-status error";
    btn.disabled = false;
  }
}

// Filter chips
document.querySelectorAll(".filter-chip").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    activeFilter = chip.dataset.status;
    renderItems();
  });
});

document.getElementById("reload-btn").addEventListener("click", loadItems);

// Add new
document.getElementById("add-btn").addEventListener("click", () => {
  document.getElementById("add-modal-overlay").classList.add("open");
});
document.getElementById("modal-close").addEventListener("click", () => {
  document.getElementById("add-modal-overlay").classList.remove("open");
});
document.getElementById("add-modal-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("add-modal-overlay"))
    document.getElementById("add-modal-overlay").classList.remove("open");
});

document.getElementById("create-btn").addEventListener("click", async () => {
  const name = document.getElementById("new-name").value.trim();
  if (!name) { alert("Please enter an item name."); return; }
  const statusIdx = document.getElementById("new-status").value;
  const vendor = document.getElementById("new-vendor").value.trim();
  const po = document.getElementById("new-po").value.trim();
  const arrival = document.getElementById("new-arrival").value;
  const notes = document.getElementById("new-notes").value.trim();

  const btn = document.getElementById("create-btn");
  const statusEl = document.getElementById("create-status");
  btn.disabled = true;
  statusEl.textContent = "Creating…";
  statusEl.className = "save-status";

  const colValues = {};
  colValues[STATUS_COL] = JSON.stringify({ index: parseInt(statusIdx) });
  if (vendor) colValues[VENDOR_COL] = JSON.stringify(vendor);
  if (po) colValues[PO_COL] = JSON.stringify(po);
  if (arrival) colValues[ARRIVAL_COL] = JSON.stringify({ date: arrival });
  if (notes) colValues[NOTES_COL] = JSON.stringify({ text: notes });

  const groupId = GROUP_MAP[statusIdx] || "topics";
  try {
    const colValStr = JSON.stringify(JSON.stringify(colValues));
    await mondayQuery(`mutation {
      create_item(
        board_id: ${BOARD_ID},
        group_id: "${groupId}",
        item_name: ${JSON.stringify(name)},
        column_values: ${colValStr}
      ) { id }
    }`);
    statusEl.textContent = "✓ Created!";
    statusEl.className = "save-status";
    ["new-name","new-vendor","new-po","new-arrival","new-notes"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("new-status").value = "5";
    setTimeout(() => {
      document.getElementById("add-modal-overlay").classList.remove("open");
      statusEl.textContent = "";
      loadItems();
    }, 1000);
  } catch (e) {
    statusEl.textContent = "Error: " + e.message;
    statusEl.className = "save-status error";
    btn.disabled = false;
  }
});

function fRow(label, value) {
  return `<div class="field-row">
    <span class="field-label">${label}</span>
    <span class="field-value${!value?" empty":""}">${!value ? "Not set" : esc(value)}</span>
  </div>`;
}
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function escA(s) { return String(s||"").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

loadItems();
</script>
